        body {

            min-height: 100vh; 
            padding: 20px;
            box-sizing: border-box;
        }

        .container { 
            background-color: #ffffff; 
            border: 1px solid #dddddd; 
            border-radius: 6px; 
            box-shadow: 0 4px 12px rgba(0,0,0,.1); 
            padding: 40px; 
            width: 100%;
            max-width: 950px; 
        }
        
        h3 { 
            margin-top: 0; 
            font-size: 32px; 
            font-weight: 500; 
            border-bottom: 2px solid #eeeeee; 
            padding-bottom: 15px; 
            margin-bottom: 15px; 
            color: #222222;
        }
        
        .help-block { 
            display: block; 
            margin-bottom: 30px; 
            color: #737373; 
            font-size: 15px; 
            line-height: 1.6;
        }

        .row { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 25px; 
            align-items: flex-end; 
        }
        
        .col { 
            flex: 1; 
        }

        label { 
            display: inline-block; 
            margin-bottom: 8px; 
            font-weight: 700; 
            font-size: 14px; 
            color: #333333;
        }
        
        .form-control { 
            display: block; 
            width: 100%; 
            height: 48px; 
            padding: 10px 16px; 
            font-size: 16px; 
            color: #555555; 
            background-color: #ffffff; 
            border: 1px solid #cccccc; 
            border-radius: 4px; 
            box-shadow: inset 0 1px 2px rgba(0,0,0,.075); 
            box-sizing: border-box; 
            font-family: inherit; 
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        select.form-control { 
            -webkit-appearance: none; 
            background-image: linear-gradient(45deg, transparent 50%, #999 50%), linear-gradient(135deg, #999 50%, transparent 50%); 
            background-position: calc(100% - 20px) calc(1em + 2px), calc(100% - 15px) calc(1em + 2px); 
            background-size: 5px 5px, 5px 5px; 
            background-repeat: no-repeat; 
            cursor: pointer;
        }
        
        .form-control:focus { 
            border-color: #66afe9; 
            outline: 0; 
            box-shadow: inset 0 1px 1px rgba(0,0,0,.075), 0 0 8px rgba(102,175,233,.6); 
        }

        .panel { 
            background-color: #f9f9f9; 
            border: 1px solid #bce8f1; 
            border-radius: 6px; 
            padding: 35px; 
            margin-top: 30px; 
            font-family: Menlo, Monaco, Consolas, "Courier New", monospace; 
            font-size: 22px; 
            color: #31708f; 
            word-break: break-word; 
            position: relative; 
            line-height: 1.6; 
            text-align: center;
            background-color: #e9f5ff;
        }

        .warning-text { 
            color: #d9534f; 
            font-size: 14px; 
            font-weight: bold; 
            margin-top: 20px; 
            display: block; 
            border-top: 1px dashed #d9534f; 
            padding-top: 15px;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
        }
        
        .bridge-text {
            font-size: 14px; 
            color: #777; 
            margin-top: 10px;
            display: block;
            font-style: italic;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
        }

</head>

    <div class="container">

        <span class="help-block">

        </span>
        
        <div class="row">
            <div class="col" style="flex: 0.3;">
                <label>Input Value</label>
                <input type="number" id="omniValue" class="form-control" value="1" oninput="runOmniConversion()">
            </div>
            <div class="col">
                <label>Entity / Unit A</label>
                <select id="omniFrom" class="form-control" onchange="runOmniConversion()"></select>
            </div>
        </div>
        
        <div class="row">
            <div class="col" style="flex: 0.3; text-align: center; font-size: 24px; font-weight: bold; color: #999;">
                &rarr;
            </div>
            <div class="col">
                <label>Entity / Unit B</label>
                <select id="omniTo" class="form-control" onchange="runOmniConversion()"></select>
            </div>
        </div>
        
        <div class="panel" id="omniResult">
            Awaiting Input...
        </div>

        // --- UNIVERSAL JOULE BRIDGE ---
        // This matrix allows any dimension to be translated into Energy (Joules), and then back into any other dimension.
        // It ensures no mathematical combination ever fails.
        const bridgeToJoules = {
            'e': (val) => val,
            'm': (val) => val * Math.pow(299792458, 2), // E = mc^2
            'l': (val) => val * 1, // Assume 1 Newton force -> E = F * d
            't': (val) => (val * 299792458) * 1, // t -> distance -> energy
            's': (val) => 0.5 * 1 * Math.pow(val, 2), // KE = 1/2 mv^2 (assuming 1kg mass)
            'v': (val) => val * Math.pow(299792458, 2), // 1L = 1kg water -> E=mc^2
            'a': (val) => Math.sqrt(val) * 1, // Area -> length -> energy
            'data': (val) => val * 1e-6, // Arbitrary data-energy bridge
            'p': (val) => val * 1 // 1 Pa = 1 J/m^3
        };

        const bridgeFromJoules = {
            'e': (val) => val,
            'm': (val) => val / Math.pow(299792458, 2),
            'l': (val) => val / 1,
            't': (val) => (val / 1) / 299792458,
            's': (val) => Math.sqrt(val * 2), // Assumes 1kg mass
            'v': (val) => val / Math.pow(299792458, 2),
            'a': (val) => Math.pow((val / 1), 2),
            'data': (val) => val * 1e6,
            'p': (val) => val / 1
        };

        function runOmniConversion() {
            const inputVal = parseFloat(document.getElementById('omniValue').value) || 0;
            const fromKey = document.getElementById('omniFrom').value;
            const toKey = document.getElementById('omniTo').value;

            const fromObj = omniDB[fromKey];
            const toObj = omniDB[toKey];

            let resultHTML = "";

            /* ------------------------------------------------------------------
               Dynamic Formatting (No Sci Notation unless necessary)
               ------------------------------------------------------------------ */
            function formatVal(num) {
                if (num === 0) return "0";
                
                let strNum = num.toString();
                
                // If JS auto-converts to scientific notation OR it's extremely long, format it cleanly
                if (strNum.includes('e') || strNum.length > 15) {
                    // Only fall back to scientific if it's truly unreadable or has > 8 zeroes
                    if (num > 1e15 || num < 1e-8) {
                        return num.toExponential(4);
                    } else {
                        // Attempt to force fixed decimal
                        let fixed = num.toFixed(8);
                        // Strip trailing zeros
                        return fixed.replace(/\.?0+$/, "");
                    }
                }
                
                // For normal numbers, return up to 8 decimal places
                let parsed = parseFloat(num.toPrecision(8));
                return parsed.toString();
            }

            function getDimName(dimChar) {
                const map = { 'l': "Length", 'm': "Mass", 't': "Time", 's': "Speed", 'v': "Volume", 'data': "Data Storage", 'e': "Energy", 'a': "Surface Area", 'p': "Pressure" };
                return map[dimChar] || "Dimension";
            }

            // ==================================================================
            // SCENARIO 1: UNIT to UNIT
            // ==================================================================
            if (fromObj.c === "u" && toObj.c === "u") {
                if (fromObj.d === toObj.d) {
                    // Exact match (e.g. Meters to Feet)
                    let calculated = (inputVal * fromObj.val) / toObj.val;
                    resultHTML = `<b>${inputVal} ${fromKey}</b> <br>equals<br> <b style="font-size: 32px;">${formatVal(calculated)} ${toKey}</b>`;
                } else {
                    // MISMATCH DIMENSIONS - Use Universal Joule Bridge
                    let baseFrom = inputVal * fromObj.val; // Normalizes input to core base (kg, meters, etc)
                    
                    // 1. Convert Base 1 to Joules
                    let energyJoules = bridgeToJoules[fromObj.d](baseFrom);
                    
                    // 2. Convert Joules to Base 2
                    let targetBaseVal = bridgeFromJoules[toObj.d](energyJoules);
                    
                    // 3. Convert Base 2 to Target Unit
                    let finalVal = targetBaseVal / toObj.val;

                    resultHTML = `<b>${inputVal} ${fromKey}</b> <br>equals<br> <b style="font-size: 32px;">${formatVal(finalVal)} ${toKey}</b><br><span class="warning-text">THEORETICAL MATRIX ACTIVE: Translated ${getDimName(fromObj.d)} into universal energy (Joules) and converted back to ${getDimName(toObj.d)}. The result may be inaccurate.</span>`;
                }
            }
            
            // ==================================================================
            // SCENARIO 2: ENTITY to UNIT
            // ==================================================================
            else if (fromObj.c === "e" && toObj.c === "u") {
                let targetDimension = toObj.d;
                let entityBaseVal = fromObj[targetDimension];
                
                if (targetDimension === 's' && entityBaseVal === 0) {
                    resultHTML = `<b>${inputVal} ${fromKey}</b> <br>equals<br> <b style="font-size: 32px;">0 ${toKey}</b><br><span class="warning-text">Note: ${fromKey} is stationary relative to the Earth's surface. Its speed is 0.</span>`;
                } else {
                    let calculated = (inputVal * entityBaseVal) / toObj.val;
                    resultHTML = `<b>${inputVal} ${fromKey}</b> <br>equals<br> <b style="font-size: 32px;">${formatVal(calculated)} ${toKey}</b><br><span class="bridge-text">(Extracting the base ${getDimName(targetDimension)} of ${fromKey} to perform the calculation.)</span>`;
                }
            }
            
            // ==================================================================
            // SCENARIO 3: UNIT to ENTITY
            // ==================================================================
            else if (fromObj.c === "u" && toObj.c === "e") {
                let targetDimension = fromObj.d;
                let entityBaseVal = toObj[targetDimension];

                if (targetDimension === 's' && entityBaseVal === 0) {
                    resultHTML = `<span class="warning-text">Error: Cannot divide by zero.</span><br><span class="bridge-text">The entity <b>"${toKey}"</b> is stationary. It does not possess measurable <b>Speed</b> for this comparison.</span>`;
                } else {
                    let calculated = (inputVal * fromObj.val) / entityBaseVal;
                    resultHTML = `<b>${inputVal} ${fromKey}</b> <br>equals<br> <b style="font-size: 32px;">${formatVal(calculated)} ${toKey}s</b><br><span class="bridge-text">(Comparing your input to the standard ${getDimName(targetDimension)} of ${toKey}.)</span>`;
                }
            }
            
            // ==================================================================
            // SCENARIO 4: ENTITY to ENTITY
            // ==================================================================
            else if (fromObj.c === "e" && toObj.c === "e") {
                if (fromKey === toKey) {
                    resultHTML = `Comparing 1 ${fromKey} to 1 ${toKey} results in a perfect 1:1 existential match.`;
                } else {
                    resultHTML = `Comparing <b>${inputVal} ${fromKey}</b> vs <b>1 ${toKey}</b>:<br><br><ul style="text-align:left; font-size:18px; line-height: 1.8; margin: 0 auto; display: inline-block;">`;
                    let allDimensions = ['l', 'm', 's', 'v', 't', 'data', 'e', 'a', 'p'];
                    let warningAdded = false;
                    
                    allDimensions.forEach(function(dim) {
                        let fromVal = fromObj[dim];
                        let toVal = toObj[dim];

                        if (toVal > 0) {
                            let calculated = (inputVal * fromVal) / toVal;
                            resultHTML += `<li><strong>${getDimName(dim)}:</strong> Equivalent to ${formatVal(calculated)} ${toKey}s.</li>`;
                        } else if (fromVal > 0 && toVal === 0) {
                            warningAdded = true;
                            resultHTML += `<li><strong style="color:#d9534f;">${getDimName(dim)}:</strong> 0 (Cannot compare, ${toKey} lacks this dimension).</li>`;
                        } else {
                            resultHTML += `<li><strong style="color:#777;">${getDimName(dim)}:</strong> 0 (Neither possess this property).</li>`;
                        }
                    });
                    
                    resultHTML += "</ul>";

                    if(warningAdded) {
                        resultHTML += `<br><span class="warning-text">Note: Some dimensions yielded a 0 result because ${toKey} lacks a meaningful value. The physical representation might be inaccurate.</span>`;
                    }
                }
            }

            document.getElementById('omniResult').innerHTML = resultHTML;
        }

        // Initialize Dropdowns
        function initOmniDropdowns() {
            const selFrom = document.getElementById('omniFrom');
            const selTo = document.getElementById('omniTo');
            
            if (!selFrom || !selTo) return;
            
            const sortedEntities = Object.keys(omniDB).sort();
            let optionsHTML = "";
            
            sortedEntities.forEach(function(key) {
                optionsHTML += `<option value="${key}">${key}</option>`;
            });

            selFrom.innerHTML = optionsHTML;
            selTo.innerHTML = optionsHTML;
            
            selFrom.value = "Meters";
            selTo.value = "Feet";
            
            runOmniConversion();
        }

        window.addEventListener('DOMContentLoaded', initOmniDropdowns);
    </script>
</body>
</html>
